<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MS DTF — Tiruppur's Fastest DTF Printing Partner</title>
<meta name="description" content="MS DTF — Premium DTF printing, reflective printing, labels, uniforms, and corporate branding from Tiruppur. Bulk orders, no minimum, 1 hour delivery." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink: #0A0A0A;
    --ink-2: #1a1a1a;
    --muted: #5a5a5a;
    --muted-2: #8a8a8a;
    --line: rgba(10,10,10,.10);
    --line-2: rgba(10,10,10,.06);
    --paper: #FAFAF7;
    --paper-2: #F2F0EA;
    --white: #ffffff;
    --accent: #FF4D14;
    --accent-ink: #ffffff;
    --accent-soft: #FFE4D6;
    --green: #00C16A;
    --display: "Unbounded", "Inter Tight", system-ui, sans-serif;
    --sans: "Manrope", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
    --container: 1320px;
    --gutter: clamp(20px, 4vw, 56px);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  .container {
    width: 100%;
    max-width: var(--container);
    margin: 0 auto;
    padding-left: var(--gutter);
    padding-right: var(--gutter);
  }

  /* ────── Type ────── */
  .display {
    font-family: var(--display);
    font-weight: 700;
    letter-spacing: -0.045em;
    line-height: 0.94;
    text-wrap: balance;
  }
  .mono {
    font-family: var(--mono);
    font-weight: 500;
    letter-spacing: 0;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .eyebrow .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 999px;
    margin-right: 8px;
    transform: translateY(-2px);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: translateY(-2px) scale(1); }
    50% { opacity: .35; transform: translateY(-2px) scale(.7); }
  }

  /* ────── Buttons ────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 22px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.005em;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .2s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
    white-space: nowrap;
    font-family: var(--sans);
  }
  .btn-primary {
    background: var(--ink);
    color: var(--white);
    box-shadow: 0 1px 0 rgba(255,255,255,.1) inset, 0 8px 24px -8px rgba(0,0,0,.5);
  }
  .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
  .btn-accent {
    background: var(--accent);
    color: var(--accent-ink);
    box-shadow: 0 1px 0 rgba(255,255,255,.2) inset, 0 10px 24px -10px rgba(255,77,20,.7);
  }
  .btn-accent:hover { background: var(--ink); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border-color: var(--line);
  }
  .btn-ghost:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .btn .arr { width: 16px; height: 16px; }

  /* ────── Header ────── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,250,247,.78);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border-bottom: 1px solid var(--line-2);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
  }
  .header nav {
    display: flex;
    gap: 28px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-2);
  }
  .header nav a { opacity: .85; transition: opacity .2s; }
  .header nav a:hover { opacity: 1; }
  @media (max-width: 760px) { .header nav { display: none; } }
  .header .right { display: flex; align-items: center; gap: 10px; }
  .header .phone {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    padding-right: 12px;
    border-right: 1px solid var(--line);
  }
  @media (max-width: 880px) { .header .phone { display: none; } }

  /* ────── Logo wrapper ────── */
  .logo { display: inline-flex; align-items: center; gap: 6px; }

  /* ────── Pill chips ────── */
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--white);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-2);
    white-space: nowrap;
  }
  .chip .chip-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 999px;
  }
  .chip.dark { background: var(--ink); color: var(--white); border-color: transparent; }
  .chip.dark .chip-dot { background: var(--accent); }

  /* ────── Sections ────── */
  section { position: relative; }
  .section-pad { padding: clamp(72px, 9vw, 140px) 0; }
  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 40px; margin-bottom: 56px; flex-wrap: wrap;
  }
  .section-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(36px, 5.6vw, 70px);
    line-height: 1.0;
    letter-spacing: -0.045em;
    margin: 0;
    max-width: 18ch;
    text-wrap: balance;
  }
  .section-title em {
    font-style: normal;
    color: var(--accent);
  }
  .section-sub {
    font-size: 17px;
    line-height: 1.5;
    color: var(--muted);
    max-width: 42ch;
    margin: 0;
    font-weight: 500;
  }

  /* ────── Floating WhatsApp ────── */
  .wa-float {
    position: fixed;
    right: 22px; bottom: 22px;
    z-index: 90;
    width: 60px; height: 60px;
    border-radius: 999px;
    background: #25D366;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px -8px rgba(37,211,102,.6), 0 0 0 8px rgba(37,211,102,.12);
    transition: transform .25s ease, box-shadow .25s ease;
    cursor: pointer;
  }
  .wa-float:hover { transform: translateY(-2px) scale(1.05); }
  .wa-float svg { width: 30px; height: 30px; }
  .wa-float::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 999px;
    border: 2px solid #25D366;
    opacity: .35;
    animation: waPulse 2.2s ease-out infinite;
  }
  @keyframes waPulse {
    0% { transform: scale(1); opacity: .45; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  /* ────── Hero scaffolding ────── */
  .hero { padding: 24px 0 80px; position: relative; overflow: hidden; }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: clamp(32px, 5vw, 80px);
    align-items: center;
  }
  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; } }
  .hero-h {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(44px, 7.2vw, 104px);
    line-height: 0.96;
    letter-spacing: -0.055em;
    margin: 24px 0 24px;
    text-wrap: balance;
  }
  .hero-h em {
    font-style: normal;
    color: var(--accent);
    position: relative;
  }
  .hero-sub {
    font-size: clamp(16px, 1.4vw, 19px);
    line-height: 1.5;
    color: var(--muted);
    max-width: 50ch;
    margin: 0 0 32px;
    font-weight: 500;
  }
  .hero-cta {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .hero-trust {
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  /* ────── Stat cards ────── */
  .stat {
    padding: 28px;
    border-radius: 18px;
    background: var(--white);
    border: 1px solid var(--line);
  }
  .stat .num {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(40px, 4.5vw, 56px);
    line-height: 1;
    letter-spacing: -0.05em;
  }
  .stat .num em { font-style: normal; color: var(--accent); }
  .stat .lab {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ────── Footer ────── */
  .footer {
    background: var(--ink);
    color: rgba(255,255,255,.7);
    padding: 80px 0 32px;
  }
  .footer a { color: rgba(255,255,255,.7); }
  .footer a:hover { color: var(--white); }
  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 48px;
    margin-bottom: 56px;
  }
  @media (max-width: 760px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; } }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,.1);
    padding-top: 24px;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(255,255,255,.45);
  }

  /* ────── Marquee ────── */
  .marquee {
    display: flex;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  }
  .marquee-track {
    display: flex;
    gap: 48px;
    padding-right: 48px;
    animation: marquee 38s linear infinite;
    white-space: nowrap;
    flex-shrink: 0;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }
  .marquee-item {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(28px, 4vw, 56px);
    letter-spacing: -0.04em;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 48px;
  }
  .marquee-item .star {
    color: var(--accent);
    font-size: .9em;
  }

  /* in-view fade-up */
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s ease, transform .7s ease; }
  .reveal.in { opacity: 1; transform: none; }

  /* service card staggered reveal */
  .svc-card {
    opacity: 0;
    transform: translateY(28px) scale(.985);
    transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1), border-color .3s ease, box-shadow .3s ease;
  }
  .svc-card.in {
    opacity: 1;
    transform: none;
  }
  .svc-card.in::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 22px;
    box-shadow: 0 0 0 2px var(--accent) inset;
    opacity: 0;
    animation: svc-flash 1.1s ease-out forwards;
    pointer-events: none;
  }
  @keyframes svc-flash {
    0%   { opacity: 0; transform: scale(.98); }
    35%  { opacity: 1; }
    100% { opacity: 0; transform: scale(1); }
  }

  /* trusted-by marquee */
  .trust-marquee {
    display: flex;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
    padding: 4px 0;
  }
  .trust-track {
    display: flex;
    gap: 10px;
    padding-right: 10px;
    animation: trust-marquee 32s linear infinite;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .trust-marquee:hover .trust-track { animation-play-state: paused; }
  @keyframes trust-marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }
  .trust-chip {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 22px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--white);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-2);
    white-space: nowrap;
    transition: background .25s ease, color .25s ease, border-color .25s ease, transform .25s ease;
  }
  .trust-chip:hover {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
    transform: translateY(-2px);
  }
  .trust-chip .tag-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: .1em;
  }

  /* ────── Services tiles ────── */
  .svc-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 980px) { .svc-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .svc-grid { grid-template-columns: 1fr; } }

  .svc-card {
    position: relative;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 22px;
    overflow: hidden;
    min-height: 320px;
    display: flex;
    flex-direction: column;
  }
  .svc-card.in:hover, .svc-card:hover {
    transform: translateY(-4px);
    border-color: var(--ink);
    box-shadow: 0 30px 60px -30px rgba(0,0,0,.25);
  }
  .svc-card .svc-anim {
    height: 180px;
    border-radius: 14px;
    background: var(--paper-2);
    overflow: hidden;
    position: relative;
    margin-bottom: 18px;
  }
  .svc-card h3 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 21px;
    letter-spacing: -0.03em;
    margin: 0 0 6px;
  }
  .svc-card p { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.5; font-weight: 500; }
  .svc-card .svc-num {
    position: absolute;
    top: 22px; right: 22px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted-2);
    letter-spacing: .1em;
  }
  .svc-card.big { grid-column: span 2; }
  @media (max-width: 980px) { .svc-card.big { grid-column: span 2; } }
  @media (max-width: 560px) { .svc-card.big { grid-column: span 1; } }

  /* ────── Why grid ────── */
  .why-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
  }
  .why-cell {
    grid-column: span 4;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 28px;
    min-height: 200px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .why-cell.dark { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .why-cell.dark .lab { color: rgba(255,255,255,.6); }
  .why-cell.accent { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .why-cell.accent .lab { color: rgba(255,255,255,.85); }
  .why-cell.wide { grid-column: span 8; }
  .why-cell.tall { min-height: 260px; }
  @media (max-width: 980px) {
    .why-cell, .why-cell.wide { grid-column: span 6; }
  }
  @media (max-width: 560px) {
    .why-cell, .why-cell.wide { grid-column: span 12; }
  }

  /* contact */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 880px) { .contact-grid { grid-template-columns: 1fr; } }
  .form-field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .form-field label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted-2);
  }
  .form-field input, .form-field textarea, .form-field select {
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(255,255,255,.18);
    color: var(--white);
    font-family: inherit;
    font-size: 16px;
    padding: 10px 0 12px;
    outline: none;
    transition: border-color .2s;
  }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
    border-bottom-color: var(--accent);
  }
  .form-field input::placeholder, .form-field textarea::placeholder { color: rgba(255,255,255,.35); }

  .hide-sm { }
  @media (max-width: 760px) { .hide-sm { display: none !important; } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <!-- ── Logo ── -->
  <script type="text/babel">
    function MsLogo({ variant = "period", color = "var(--ink)", accent = "var(--accent)", size = 22 }) {
      const base = {
        fontFamily: "var(--display)",
        fontWeight: 800,
        fontSize: size,
        letterSpacing: "-0.02em",
        color,
        lineHeight: 1,
        textTransform: "uppercase",
      };

      if (variant === "slash") {
        return (
          <span className="logo" style={{ gap: 0 }}>
            <span style={{ ...base }}>MS</span>
            <span style={{
              display: "inline-block",
              width: 2, height: size * 0.95,
              margin: `0 ${size * 0.34}px`,
              background: accent,
              transform: "skewX(-22deg)",
            }}/>
            <span style={{ ...base, color: "var(--muted-2)", fontWeight: 600 }}>DTF</span>
          </span>
        );
      }

      if (variant === "stacked") {
        return (
          <span className="logo" style={{ flexDirection: "column", alignItems: "flex-start", gap: 0, lineHeight: 0.85 }}>
            <span style={{ ...base, fontSize: size }}>MS</span>
            <span style={{ ...base, fontSize: size, color: accent }}>DTF</span>
          </span>
        );
      }

      if (variant === "period") {
        return (
          <span className="logo" style={{ gap: 0 }}>
            <span style={{ ...base }}>MS&nbsp;DTF</span>
            <span style={{
              display: "inline-block",
              width: size * 0.34, height: size * 0.34,
              marginLeft: 2, marginBottom: -2,
              background: accent,
              borderRadius: 2,
              alignSelf: "flex-end",
            }}/>
          </span>
        );
      }

      if (variant === "outlined") {
        return (
          <span className="logo" style={{ gap: 4 }}>
            <span style={{ ...base }}>MS</span>
            <span style={{
              ...base,
              color: "transparent",
              WebkitTextStroke: `1.4px ${typeof color === 'string' ? color : 'currentColor'}`,
              fontWeight: 700
            }}>DTF</span>
          </span>
        );
      }

      if (variant === "bracket") {
        return (
          <span className="logo" style={{ gap: 6 }}>
            <span style={{ ...base, color: accent }}>[</span>
            <span style={{ ...base }}>MS</span>
            <span style={{ ...base, color: accent }}>]</span>
            <span style={{ ...base, color: "var(--muted-2)", marginLeft: 4 }}>DTF</span>
          </span>
        );
      }

      // default: tight wordmark
      return (
        <span className="logo" style={{ gap: 0 }}>
          <span style={{ ...base }}>MS</span>
          <span style={{ display: "inline-block", width: size * 0.18 }}/>
          <span style={{ ...base, color: "var(--muted-2)", fontWeight: 600 }}>DTF</span>
        </span>
      );
    }

    Object.assign(window, { MsLogo });
  </script>

  <!-- ── Animations ── -->
  <script type="text/babel">
    const _accent = "var(--accent)";

    function DTFAnim() {
      return (
        <div style={{ position: "absolute", inset: 0, background: "#0A0A0A" }}>
          <style>{`
            @keyframes dtf-head { 0%,100% { transform: translateX(8%); } 50% { transform: translateX(72%); } }
            @keyframes dtf-paint { 0% { stroke-dashoffset: 220; opacity: .9; } 80% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 1; } }
            @keyframes dtf-fade { 0%, 40% { opacity: 0; transform: scale(.9); } 70%,100%{ opacity: 1; transform: scale(1); } }
          `}</style>
          <svg width="100%" height="100%" viewBox="0 0 300 180" preserveAspectRatio="xMidYMid slice" style={{ position: "absolute", inset: 0 }}>
            <defs>
              <pattern id="weave" width="6" height="6" patternUnits="userSpaceOnUse">
                <path d="M0 3 H6 M3 0 V6" stroke="rgba(255,255,255,.06)" strokeWidth=".5" />
              </pattern>
              <linearGradient id="floor" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stopColor="#141414"/>
                <stop offset="1" stopColor="#0a0a0a"/>
              </linearGradient>
            </defs>
            <rect width="300" height="180" fill="url(#floor)" />
            <rect width="300" height="180" fill="url(#weave)" />
            <g style={{ animation: "dtf-fade 3.6s 0.2s ease forwards", opacity: 0, transformOrigin: "150px 90px" }}>
